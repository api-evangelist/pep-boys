aid: pep-boys
name: Pep Boys
description: >-
  Pep Boys is an American automotive aftermarket service chain founded in 1921
  and headquartered in Bala Cynwyd, Pennsylvania. Owned by Icahn Enterprises
  since 2016, Pep Boys completed its transition away from retail parts in
  December 2023 and now operates as a service-only chain with roughly 850 to
  900+ service centers across the U.S. and Puerto Rico, including a Pep Boys
  Mobile Crew offering for fleet and on-location maintenance. Pep Boys does not
  publish a public developer program, OpenAPI definition, SDKs, or webhooks.
